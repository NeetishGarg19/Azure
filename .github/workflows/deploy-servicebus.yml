name: Deploy Service Bus Entity

on:
  workflow_dispatch:
    inputs:
      entityType:
        description: 'Queue or Topic'
        required: true
        type: choice
        options:
          - Queue
          - Topic

      entityName:
        description: 'Entity Name'
        required: true

jobs:
  deploy:
    runs-on: windows-latest

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

    - name: Run PowerShell Script
      shell: pwsh
      run: |
        ./scripts/deploy-servicebus.ps1 `
          -EntityType "${{ github.event.inputs.entityType }}" `
          -EntityName "${{ github.event.inputs.entityName }}"
