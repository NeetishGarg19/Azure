name: Deploy Service Bus Entity

on:
  workflow_dispatch:
    inputs:
      config_file:
        description: "Path to Service Bus config file"
        required: true
        default: "servicebus/topic-template.yaml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      RESOURCE_GROUP: rg-bnk-bridge-prod
      NAMESPACE_NAME: BridgeServiceBus

    steps:

      # ------------------------------------------------
      # Checkout
      # ------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------------------
      # Install yq
      # ------------------------------------------------
      - name: Install yq
        run: |
          sudo wget -q https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq
          yq --version

      # ------------------------------------------------
      # Azure Login
      # ------------------------------------------------
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Azure Subscription
        run: |
          az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

      # ------------------------------------------------
      # Read Config
      # ------------------------------------------------
      - name: Read Config
        run: |
          set -e

          FILE="${{ github.event.inputs.config_file }}"

          if [ ! -f "$FILE" ]; then
            echo "Config file not found: $FILE"
            exit 1
          fi

          ENTITY_TYPE=$(yq -r '.entity.type' "$FILE")
          ENTITY_NAME=$(yq -r '.entity.name' "$FILE")

          PARTITIONING=$(yq -r '.settings.partitioning // false' "$FILE")
          MAX_SIZE=$(yq -r '.settings.maxSizeMB // 1024' "$FILE")
          TTL=$(yq -r '.settings.defaultMessageTimeToLive // "P10675199DT2H48M5.4775807S"' "$FILE")

          echo "ENTITY_TYPE=$ENTITY_TYPE" >> $GITHUB_ENV
          echo "ENTITY_NAME=$ENTITY_NAME" >> $GITHUB_ENV
          echo "PARTITIONING=$PARTITIONING" >> $GITHUB_ENV
          echo "MAX_SIZE=$MAX_SIZE" >> $GITHUB_ENV
          echo "TTL=$TTL" >> $GITHUB_ENV

          echo "Entity Type : $ENTITY_TYPE"
          echo "Entity Name : $ENTITY_NAME"
          echo "Partitioning: $PARTITIONING"
          echo "Max Size    : $MAX_SIZE"
          echo "TTL         : $TTL"

      # ------------------------------------------------
      # Validate Naming
      # ------------------------------------------------
      - name: Validate Naming Convention
        run: |
          set -e

          if [[ ! "$ENTITY_NAME" =~ ^s-[a-z0-9-]+-(qa|prod)$ ]]; then
            echo "Invalid naming convention"
            exit 1
          fi

          echo "Naming validation passed"

      # ------------------------------------------------
      # Create or Update Topic
      # ------------------------------------------------
      - name: Create or Update Topic
        if: env.ENTITY_TYPE == 'Topic'
        run: |
          set -e

          if az servicebus topic show \
            --resource-group "$RESOURCE_GROUP" \
            --namespace-name "$NAMESPACE_NAME" \
            --name "$ENTITY_NAME" > /dev/null 2>&1
          then
            echo "Topic exists. Updating..."

            az servicebus topic update \
              --resource-group "$RESOURCE_GROUP" \
              --namespace-name "$NAMESPACE_NAME" \
              --name "$ENTITY_NAME" \
              --max-size "$MAX_SIZE" \
              --default-message-time-to-live "$TTL"

            echo "Topic updated"

          else
            echo "Creating topic..."

            az servicebus topic create \
              --resource-group "$RESOURCE_GROUP" \
              --namespace-name "$NAMESPACE_NAME" \
              --name "$ENTITY_NAME" \
              --enable-partitioning "$PARTITIONING" \
              --max-size "$MAX_SIZE" \
              --default-message-time-to-live "$TTL"

            echo "Topic created"
          fi

      # ------------------------------------------------
      # Debug Topic Config
      # ------------------------------------------------
      - name: Debug Config
        if: env.ENTITY_TYPE == 'Topic'
        run: |
          FILE="${{ github.event.inputs.config_file }}"

          echo "===== FILE ====="
          cat "$FILE"

          echo "===== SUBSCRIPTIONS ====="
          yq -r '.subscriptions[].name' "$FILE" || true

      # ------------------------------------------------
      # Create Topic Subscriptions
      # ------------------------------------------------
      - name: Create Subscriptions
        if: env.ENTITY_TYPE == 'Topic'
        run: |
          set -e

          FILE="${{ github.event.inputs.config_file }}"

          if yq -e '.subscriptions' "$FILE" > /dev/null 2>&1; then

            while IFS= read -r SUB
            do
              [ -z "$SUB" ] && continue

              echo "Processing subscription: $SUB"

              if az servicebus topic subscription show \
                --resource-group "$RESOURCE_GROUP" \
                --namespace-name "$NAMESPACE_NAME" \
                --topic-name "$ENTITY_NAME" \
                --name "$SUB" > /dev/null 2>&1
              then
                echo "Subscription already exists: $SUB"
              else
                az servicebus topic subscription create \
                  --resource-group "$RESOURCE_GROUP" \
                  --namespace-name "$NAMESPACE_NAME" \
                  --topic-name "$ENTITY_NAME" \
                  --name "$SUB"

                echo "Subscription created: $SUB"
              fi

            done < <(yq -r '.subscriptions[].name' "$FILE")

          else
            echo "No subscriptions defined"
          fi
     
            # ------------------------------------------------
      # Topic Shared Access Policies
      # ------------------------------------------------
      - name: Create Topic Shared Access Policies
        if: env.ENTITY_TYPE == 'Topic'
        run: |
          set -e

          FILE="${{ github.event.inputs.config_file }}"

          if ! yq -e '.authorizationRules' "$FILE" > /dev/null 2>&1; then
            echo "No authorization rules defined"
            exit 0
          fi

          COUNT=$(yq '.authorizationRules | length' "$FILE")

          echo "Found $COUNT authorization rules"

          for ((i=0; i<COUNT; i++))
          do
            RULE_NAME=$(yq -r ".authorizationRules[$i].name" "$FILE")

            RIGHTS=$(yq -r ".authorizationRules[$i].rights[]" "$FILE" | xargs)

            echo "Processing authorization rule: $RULE_NAME"

            if az servicebus topic authorization-rule show \
              --resource-group "$RESOURCE_GROUP" \
              --namespace-name "$NAMESPACE_NAME" \
              --topic-name "$ENTITY_NAME" \
              --name "$RULE_NAME" > /dev/null 2>&1
            then
              echo "Authorization rule already exists: $RULE_NAME"
            else
              az servicebus topic authorization-rule create \
                --resource-group "$RESOURCE_GROUP" \
                --namespace-name "$NAMESPACE_NAME" \
                --topic-name "$ENTITY_NAME" \
                --name "$RULE_NAME" \
                --rights $RIGHTS

              echo "Authorization rule created: $RULE_NAME"
            fi
          done

      # ------------------------------------------------
      # Create or Update Queue
      # ------------------------------------------------
      - name: Create or Update Queue
        if: env.ENTITY_TYPE == 'Queue'
        run: |
          set -e

          if az servicebus queue show \
            --resource-group "$RESOURCE_GROUP" \
            --namespace-name "$NAMESPACE_NAME" \
            --name "$ENTITY_NAME" > /dev/null 2>&1
          then
            echo "Queue exists. Updating..."

            az servicebus queue update \
              --resource-group "$RESOURCE_GROUP" \
              --namespace-name "$NAMESPACE_NAME" \
              --name "$ENTITY_NAME" \
              --max-size "$MAX_SIZE" \
              --default-message-time-to-live "$TTL"

            echo "Queue updated"

          else
            echo "Creating queue..."

            az servicebus queue create \
              --resource-group "$RESOURCE_GROUP" \
              --namespace-name "$NAMESPACE_NAME" \
              --name "$ENTITY_NAME" \
              --enable-partitioning "$PARTITIONING" \
              --max-size "$MAX_SIZE" \
              --default-message-time-to-live "$TTL"

            echo "Queue created"
          fi

      # ------------------------------------------------
      # Queue Shared Access Policies
      # ------------------------------------------------
      - name: Create Queue Shared Access Policies
        if: env.ENTITY_TYPE == 'Queue'
        run: |
          set -e

          FILE="${{ github.event.inputs.config_file }}"

          if ! yq -e '.authorizationRules' "$FILE" > /dev/null 2>&1; then
            echo "No authorization rules defined"
            exit 0
          fi

          COUNT=$(yq '.authorizationRules | length' "$FILE")

          echo "Found $COUNT authorization rules"

          for ((i=0; i<COUNT; i++))
          do
            RULE_NAME=$(yq -r ".authorizationRules[$i].name" "$FILE")

            RIGHTS=$(yq -r ".authorizationRules[$i].rights[]" "$FILE" | xargs)

            echo "Processing authorization rule: $RULE_NAME"

            if az servicebus queue authorization-rule show \
              --resource-group "$RESOURCE_GROUP" \
              --namespace-name "$NAMESPACE_NAME" \
              --queue-name "$ENTITY_NAME" \
              --name "$RULE_NAME" > /dev/null 2>&1
            then
              echo "Authorization rule already exists: $RULE_NAME"
            else
              az servicebus queue authorization-rule create \
                --resource-group "$RESOURCE_GROUP" \
                --namespace-name "$NAMESPACE_NAME" \
                --queue-name "$ENTITY_NAME" \
                --name "$RULE_NAME" \
                --rights $RIGHTS

              echo "Authorization rule created: $RULE_NAME"
            fi
          done

      # ------------------------------------------------
      # Verify Queue
      # ------------------------------------------------
      - name: Verify Queue Configuration
        if: env.ENTITY_TYPE == 'Queue'
        run: |
          az servicebus queue show \
            --resource-group "$RESOURCE_GROUP" \
            --namespace-name "$NAMESPACE_NAME" \
            --name "$ENTITY_NAME" \
            --query "{name:name,ttl:defaultMessageTimeToLive,maxSize:maxSizeInMegabytes}" \
            -o table

      # ------------------------------------------------
      # Verify Topic
      # ------------------------------------------------
      - name: Verify Topic Configuration
        if: env.ENTITY_TYPE == 'Topic'
        run: |
          az servicebus topic show \
            --resource-group "$RESOURCE_GROUP" \
            --namespace-name "$NAMESPACE_NAME" \
            --name "$ENTITY_NAME" \
            --query "{name:name,ttl:defaultMessageTimeToLive,maxSize:maxSizeInMegabytes}" \
            -o table

      # ------------------------------------------------
      # Complete
      # ------------------------------------------------
      - name: Complete
        run: |
          echo "Service Bus deployment completed successfully"
