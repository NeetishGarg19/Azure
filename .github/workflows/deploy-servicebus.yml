name: Deploy Service Bus Entity

on:
workflow_dispatch:
inputs:
config_file:
description: "Path to Service Bus config file"
required: true
default: "servicebus/topic-template.yaml"

jobs:
deploy:
runs-on: ubuntu-latest

```
env:
  RESOURCE_GROUP: rg-bnk-bridge-prod
  NAMESPACE_NAME: BridgeServiceBus

steps:

  # ------------------------------------------------
  # Checkout
  # ------------------------------------------------
  - name: Checkout code
    uses: actions/checkout@v4

  # ------------------------------------------------
  # Install yq
  # ------------------------------------------------
  - name: Install yq
    run: |
      sudo wget -q https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
      sudo chmod +x /usr/bin/yq

  # ------------------------------------------------
  # Azure Login
  # ------------------------------------------------
  - name: Login to Azure
    uses: azure/login@v1
    with:
      creds: ${{ secrets.AZURE_CREDENTIALS }}

  - name: Set subscription
    run: |
      az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  # ------------------------------------------------
  # Read Config
  # ------------------------------------------------
  - name: Read Config
    run: |
      set -e

      FILE="${{ github.event.inputs.config_file }}"

      if [ ! -f "$FILE" ]; then
        echo "Config file not found"
        exit 1
      fi

      ENTITY_TYPE=$(yq -r '.entity.type' "$FILE")
      ENTITY_NAME=$(yq -r '.entity.name' "$FILE")
      PARTITIONING=$(yq -r '.settings.partitioning' "$FILE")
      MAX_SIZE=$(yq -r '.settings.maxSizeMB' "$FILE")

      SUBSCRIPTIONS=$(yq -r '.subscriptions[].name // empty' "$FILE" 2>/dev/null | tr '\n' ',')

      echo "ENTITY_TYPE=$ENTITY_TYPE" >> $GITHUB_ENV
      echo "ENTITY_NAME=$ENTITY_NAME" >> $GITHUB_ENV
      echo "PARTITIONING=$PARTITIONING" >> $GITHUB_ENV
      echo "MAX_SIZE=$MAX_SIZE" >> $GITHUB_ENV
      echo "SUBSCRIPTIONS=$SUBSCRIPTIONS" >> $GITHUB_ENV

      echo "Entity Type: $ENTITY_TYPE"
      echo "Entity Name: $ENTITY_NAME"

  # ------------------------------------------------
  # Validate Naming Convention
  # ------------------------------------------------
  - name: Validate Naming Convention
    run: |
      set -e

      echo "Validating naming convention..."

      if [ "$ENTITY_TYPE" = "Topic" ]; then

        if [[ ! "$ENTITY_NAME" =~ ^s-[a-z0-9-]+-(qa|prod)$ ]]; then

          echo "Invalid Topic Naming Convention"
          echo "Expected format:"
          echo "s-<name>-<environment>"
          exit 1

        fi

      fi

      if [ "$ENTITY_TYPE" = "Queue" ]; then

        if [[ ! "$ENTITY_NAME" =~ ^q-[a-z0-9-]+-(qa|prod)$ ]]; then

          echo "Invalid Queue Naming Convention"
          echo "Expected format:"
          echo "q-<name>-<environment>"
          exit 1

        fi

      fi

      if [ "$ENTITY_TYPE" = "Topic" ] && [ -n "$SUBSCRIPTIONS" ]; then

        IFS=',' read -ra SUBS <<< "$SUBSCRIPTIONS"

        for SUB in "${SUBS[@]}"; do

          [ -z "$SUB" ] && continue

          if [[ ! "$SUB" =~ ^sb-[a-z0-9-]+-(qa|prod)$ ]]; then

            echo "Invalid Subscription Naming Convention: $SUB"
            echo "Expected format:"
            echo "sb-<name>-<environment>"
            exit 1

          fi

        done

      fi

      echo "Naming convention validation passed"

  # ------------------------------------------------
  # Create Topic
  # ------------------------------------------------
  - name: Create Topic
    if: env.ENTITY_TYPE == 'Topic'
    run: |
      set -e

      if az servicebus topic show \
        --resource-group $RESOURCE_GROUP \
        --namespace-name $NAMESPACE_NAME \
        --name $ENTITY_NAME > /dev/null 2>&1; then

        echo "Topic already exists"

      else

        az servicebus topic create \
          --resource-group $RESOURCE_GROUP \
          --namespace-name $NAMESPACE_NAME \
          --name $ENTITY_NAME \
          --enable-partitioning $PARTITIONING \
          --max-size $MAX_SIZE

        echo "Topic created"

      fi

  # ------------------------------------------------
  # Create Topic Subscriptions
  # ------------------------------------------------
  - name: Create Subscriptions
    if: env.ENTITY_TYPE == 'Topic'
    run: |
      set -e

      if [ -z "$SUBSCRIPTIONS" ]; then
        echo "No subscriptions defined"
        exit 0
      fi

      IFS=',' read -ra SUBS <<< "$SUBSCRIPTIONS"

      for SUB in "${SUBS[@]}"; do

        [ -z "$SUB" ] && continue

        echo "Processing subscription: $SUB"

        if az servicebus topic subscription show \
          --resource-group $RESOURCE_GROUP \
          --namespace-name $NAMESPACE_NAME \
          --topic-name $ENTITY_NAME \
          --name "$SUB" > /dev/null 2>&1; then

          echo "Subscription already exists: $SUB"

        else

          az servicebus topic subscription create \
            --resource-group $RESOURCE_GROUP \
            --namespace-name $NAMESPACE_NAME \
            --topic-name $ENTITY_NAME \
            --name "$SUB"

          echo "Subscription created: $SUB"

        fi

      done

  # ------------------------------------------------
  # Create Queue
  # ------------------------------------------------
  - name: Create Queue
    if: env.ENTITY_TYPE == 'Queue'
    run: |
      set -e

      if az servicebus queue show \
        --resource-group $RESOURCE_GROUP \
        --namespace-name $NAMESPACE_NAME \
        --name $ENTITY_NAME > /dev/null 2>&1; then

        echo "Queue already exists"

      else

        az servicebus queue create \
          --resource-group $RESOURCE_GROUP \
          --namespace-name $NAMESPACE_NAME \
          --name $ENTITY_NAME \
          --enable-partitioning $PARTITIONING \
          --max-size $MAX_SIZE

        echo "Queue created"

      fi

  # ------------------------------------------------
  # Complete
  # ------------------------------------------------
  - name: Complete
    run: |
      echo "Service Bus deployment completed successfully"

