name: Deploy APIM API QA

on:
  workflow_dispatch:
    inputs:
      config_file:
        description: "Path to API config file"
        required: true
        default: "apis/demo-api.yaml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      RESOURCE_GROUP: bridge-prod-conn-rg
      APIM_NAME: apim-bnk-bridge

    steps:
      # ---------------------------
      # Checkout
      # ---------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------------------
      # Install tools 
      # ---------------------------
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq libxml2-utils
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq
          yq --version

      # ---------------------------
      # Azure Login
      # ---------------------------
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set subscription
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ---------------------------
      # Read Config
      # ---------------------------
      - name: Read config
        run: |
          FILE="${{ github.event.inputs.config_file }}"

          echo "Using config file: $FILE"

          echo "API_ID=$(yq -r '.api.id' $FILE)" >> $GITHUB_ENV
          echo "API_NAME=$(yq -r '.api.displayName' $FILE)" >> $GITHUB_ENV
          echo "API_PATH=$(yq -r '.api.path' $FILE)" >> $GITHUB_ENV
          echo "BACKEND_URL=$(yq -r '.api.backendUrl' $FILE)" >> $GITHUB_ENV

      # ---------------------------
      # Create / Update API
      # ---------------------------
      - name: Create or Update API
        run: |
          if az apim api show \
            --resource-group $RESOURCE_GROUP \
            --service-name $APIM_NAME \
            --api-id $API_ID > /dev/null 2>&1; then

            echo "API exists → updating"
            az apim api update \
              --resource-group $RESOURCE_GROUP \
              --service-name $APIM_NAME \
              --api-id $API_ID \
              --service-url $BACKEND_URL

          else
            echo "Creating API..."
            az apim api create \
              --resource-group $RESOURCE_GROUP \
              --service-name $APIM_NAME \
              --api-id $API_ID \
              --display-name "$API_NAME" \
              --path $API_PATH \
              --protocols https \
              --service-url $BACKEND_URL
          fi

      # ---------------------------
      # Create Operations
      # ---------------------------
      - name: Create operations
        run: |
          FILE="${{ github.event.inputs.config_file }}"
          COUNT=$(yq '.operations | length' $FILE)

          echo "Total operations: $COUNT"

          for ((i=0;i<COUNT;i++)); do
            ID=$(yq -r ".operations[$i].id" $FILE)
            NAME=$(yq -r ".operations[$i].name" $FILE)
            METHOD=$(yq -r ".operations[$i].method" $FILE)
            URL=$(yq -r ".operations[$i].url" $FILE)

            echo "Creating operation: $ID"

            az apim api operation create \
              --resource-group $RESOURCE_GROUP \
              --service-name $APIM_NAME \
              --api-id $API_ID \
              --operation-id $ID \
              --display-name "$NAME" \
              --method $METHOD \
              --url-template $URL || echo "Operation exists"
          done

      # ---------------------------
      # Apply Policy 
      # ---------------------------
      - name: Apply policy
        run: |
          FILE="${{ github.event.inputs.config_file }}"

          echo "Creating policy.xml..."

          # Extract RAW XML
          yq -r '.policy' $FILE > policy.xml

          echo "----- POLICY -----"
          cat policy.xml
          echo "------------------"

          # Validate XML (now works)
          xmllint --noout policy.xml

          echo "Applying policy..."

          az apim api policy apply \
            --resource-group $RESOURCE_GROUP \
            --service-name $APIM_NAME \
            --api-id $API_ID \
            --xml-file policy.xml

      # ---------------------------
      # Complete
      # ---------------------------
      - name: Complete
        run: echo "APIM deployment completed successfully"
