name: Deploy APIM API QA

on:
  workflow_dispatch:
    inputs:
      config_file:
        description: "Path to API config file"
        required: true
        default: "apis/demo-api.yaml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      RESOURCE_GROUP: bridge-prod-conn-rg
      APIM_NAME: apim-bnk-bridge

    steps:
      # ---------------------------
      # Checkout
      # ---------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------------------
      # Install tools
      # ---------------------------
      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq libxml2-utils
          sudo wget -q https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq
          yq --version

      # ---------------------------
      # Azure Login
      # ---------------------------
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set subscription
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ---------------------------
      # Read Config
      # ---------------------------
      - name: Read config
        run: |
          set -e

          FILE="${{ github.event.inputs.config_file }}"
          echo "Using config file: $FILE"

          if [ ! -f "$FILE" ]; then
            echo "❌ Config file not found"
            exit 1
          fi

          API_ID=$(yq -r '.api.id // ""' "$FILE")
          API_NAME=$(yq -r '.api.displayName // ""' "$FILE")
          API_PATH=$(yq -r '.api.path // ""' "$FILE")
          BACKEND_URL=$(yq -r '.api.backendUrl // ""' "$FILE")

          [ -z "$API_ID" ] && echo "❌ API_ID missing" && exit 1
          [ -z "$API_NAME" ] && echo "❌ API_NAME missing" && exit 1
          [ -z "$API_PATH" ] && echo "❌ API_PATH missing" && exit 1
          [ -z "$BACKEND_URL" ] && echo "❌ BACKEND_URL missing" && exit 1

          echo "API_ID=$API_ID" >> $GITHUB_ENV
          echo "API_NAME=$API_NAME" >> $GITHUB_ENV
          echo "API_PATH=$API_PATH" >> $GITHUB_ENV
          echo "BACKEND_URL=$BACKEND_URL" >> $GITHUB_ENV

      # ---------------------------
      # Create / Update API
      # ---------------------------
      - name: Create or Update API
        run: |
          set -e

          if az apim api show \
            --resource-group $RESOURCE_GROUP \
            --service-name $APIM_NAME \
            --api-id $API_ID > /dev/null 2>&1; then

            echo "API exists → updating"

            az apim api update \
              --resource-group $RESOURCE_GROUP \
              --service-name $APIM_NAME \
              --api-id $API_ID \
              --service-url $BACKEND_URL

          else
            echo "Creating API..."

            az apim api create \
              --resource-group $RESOURCE_GROUP \
              --service-name $APIM_NAME \
              --api-id $API_ID \
              --display-name "$API_NAME" \
              --path $API_PATH \
              --protocols https \
              --service-url $BACKEND_URL
          fi

      # ---------------------------
      # Create Operations
      # ---------------------------
      - name: Create operations
        run: |
          set -e

          FILE="${{ github.event.inputs.config_file }}"
          COUNT=$(yq '.operations | length // 0' "$FILE")

          echo "Operations count: $COUNT"

          for ((i=0;i<COUNT;i++)); do
            ID=$(yq -r ".operations[$i].id" "$FILE")
            NAME=$(yq -r ".operations[$i].name" "$FILE")
            METHOD=$(yq -r ".operations[$i].method" "$FILE")
            URL=$(yq -r ".operations[$i].url" "$FILE")

            echo "Processing operation: $ID"

            if az apim api operation show \
              --resource-group $RESOURCE_GROUP \
              --service-name $APIM_NAME \
              --api-id $API_ID \
              --operation-id $ID > /dev/null 2>&1; then

              echo "Already exists → skipping"

            else
              az apim api operation create \
                --resource-group $RESOURCE_GROUP \
                --service-name $APIM_NAME \
                --api-id $API_ID \
                --operation-id $ID \
                --display-name "$NAME" \
                --method $METHOD \
                --url-template $URL
            fi
          done

      # ---------------------------
      # Apply Policy (FINAL WORKING FIX)
      # ---------------------------
      - name: Apply policy
        run: |
          set -e

          FILE="${{ github.event.inputs.config_file }}"

          echo "Extracting policy..."
          yq -r '.policy' "$FILE" > policy.xml

          echo "Validating XML..."
          xmllint --noout policy.xml

          echo "Applying policy..."

          az rest \
            --method PUT \
            --uri "https://management.azure.com/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/$RESOURCE_GROUP/providers/Microsoft.ApiManagement/service/$APIM_NAME/apis/$API_ID/policies/policy?api-version=2022-08-01" \
            --headers "Content-Type=application/vnd.ms-azure-apim.policy+xml" \
            --headers "If-Match=*" \
            --body "$(cat policy.xml)"

      # ---------------------------
      # Done
      # ---------------------------
      - name: Complete
        run: echo "✅ APIM deployment completed successfully"
