name: Deploy APIM API QA

on:
  workflow_dispatch:
    inputs:
      config_file:
        description: "Path to API config file"
        required: true
        default: "apis/demo-api.yaml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      RESOURCE_GROUP: bridge-prod-conn-rg
      APIM_NAME: apim-bnk-bridge

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install yq (YAML parser)
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/bin/yq
          sudo chmod +x /usr/bin/yq

      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set subscription
        run: az account set --subscription ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ---------------------------
      # Read Config
      # ---------------------------
      - name: Read config
        id: config
        run: |
          FILE="${{ github.event.inputs.config_file }}"

          echo "API_ID=$(yq '.api.id' $FILE)" >> $GITHUB_ENV
          echo "API_NAME=$(yq '.api.displayName' $FILE)" >> $GITHUB_ENV
          echo "API_PATH=$(yq '.api.path' $FILE)" >> $GITHUB_ENV
          echo "BACKEND_URL=$(yq '.api.backendUrl' $FILE)" >> $GITHUB_ENV

      # ---------------------------
      # Create API
      # ---------------------------
      - name: Create API
        run: |
          az apim api create \
            --resource-group $RESOURCE_GROUP \
            --service-name $APIM_NAME \
            --api-id $API_ID \
            --display-name "$API_NAME" \
            --path $API_PATH \
            --protocols https \
            --service-url $BACKEND_URL || echo "exists"

      # ---------------------------
      # Create Operations (LOOP)
      # ---------------------------
      - name: Create operations
        run: |
          FILE="${{ github.event.inputs.config_file }}"

          COUNT=$(yq '.operations | length' $FILE)

          for ((i=0;i<COUNT;i++)); do
            ID=$(yq ".operations[$i].id" $FILE)
            NAME=$(yq ".operations[$i].name" $FILE)
            METHOD=$(yq ".operations[$i].method" $FILE)
            URL=$(yq ".operations[$i].url" $FILE)

            echo "Creating operation: $ID"

            az apim api operation create \
              --resource-group $RESOURCE_GROUP \
              --service-name $APIM_NAME \
              --api-id $API_ID \
              --operation-id $ID \
              --display-name "$NAME" \
              --method $METHOD \
              --url-template $URL || echo "exists"
          done

      # ---------------------------
      # Apply Policy
      # ---------------------------
      - name: Apply policy
        run: |
          FILE="${{ github.event.inputs.config_file }}"

          yq '.policy' $FILE > policy.xml

          az rest \
            --method PUT \
            --headers "Content-Type=application/vnd.ms-azure-apim.policy+xml" \
            --url "https://management.azure.com/subscriptions/${{ secrets.AZURE_SUBSCRIPTION_ID }}/resourceGroups/$RESOURCE_GROUP/providers/Microsoft.ApiManagement/service/$APIM_NAME/apis/$API_ID/policies/policy?api-version=2022-08-01" \
            --body @policy.xml
